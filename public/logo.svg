<svg width="680" height="580" viewBox="0 0 680 580" role="img" xmlns="http://www.w3.org/2000/svg">
<title>SDS-23 logo</title>
<desc>S D S letterforms fused, pink S letters flanking blue D, red heart inside D, clouds below</desc>

<defs>
  <linearGradient id="gSL" x1="0%" y1="0%" x2="100%" y2="120%">
    <stop offset="0%" stop-color="#f0c0d0"/>
    <stop offset="45%" stop-color="#e89ab5"/>
    <stop offset="100%" stop-color="#c96a8a"/>
  </linearGradient>
  <linearGradient id="gD" x1="0%" y1="0%" x2="80%" y2="100%">
    <stop offset="0%" stop-color="#b8d4f0"/>
    <stop offset="45%" stop-color="#88aee0"/>
    <stop offset="100%" stop-color="#5a80c8"/>
  </linearGradient>
  <linearGradient id="gSR" x1="100%" y1="0%" x2="0%" y2="120%">
    <stop offset="0%" stop-color="#f0c0d0"/>
    <stop offset="45%" stop-color="#e89ab5"/>
    <stop offset="100%" stop-color="#c96a8a"/>
  </linearGradient>

  <!-- Heart: vivid red radial -->
  <radialGradient id="gHeart" cx="35%" cy="28%" r="65%">
    <stop offset="0%" stop-color="#ff4466"/>
    <stop offset="55%" stop-color="#dd1133"/>
    <stop offset="100%" stop-color="#880018"/>
  </radialGradient>

  <!-- Heart drop shadow filter -->
  <filter id="heartShadow" x="-60%" y="-60%" width="220%" height="220%">
    <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#cc0022" flood-opacity="0.7"/>
    <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#ff2244" flood-opacity="0.5"/>
  </filter>

  <linearGradient id="gSheen" x1="15%" y1="0%" x2="85%" y2="100%">
    <stop offset="0%" stop-color="#ffffff" stop-opacity="0.28"/>
    <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
  </linearGradient>
  <radialGradient id="gFuse" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#9b2050" stop-opacity="0.22"/>
    <stop offset="100%" stop-color="#9b2050" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="gCloud1" cx="50%" cy="40%" r="55%">
    <stop offset="0%" stop-color="#f5e6ef" stop-opacity="0.92"/>
    <stop offset="100%" stop-color="#e0c0d0" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="gCloud2" cx="50%" cy="40%" r="55%">
    <stop offset="0%" stop-color="#e8d0e0" stop-opacity="0.80"/>
    <stop offset="100%" stop-color="#d0b0c0" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="gCloud3" cx="50%" cy="40%" r="55%">
    <stop offset="0%" stop-color="#f0e0e8" stop-opacity="0.70"/>
    <stop offset="100%" stop-color="#d8b8c8" stop-opacity="0"/>
  </radialGradient>
</defs>

<!-- Fuse glow -->
<ellipse cx="340" cy="270" rx="290" ry="120" fill="url(#gFuse)"/>

